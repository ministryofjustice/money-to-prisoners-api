# generated by https://github.com/ministryofjustice/money-to-prisoners-deploy
name: Build, test and push
on:
  push:
jobs:
  build-test-push:
    name: Build, test and push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Assume IAM role to access ECR
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.ECR_REGION }}
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}

      - name: Log docker into ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tags
        run: |
          branch_lc=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')
          version=${branch_lc}.${GITHUB_SHA::7}
          tag=api.${version}
          registry=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}
          echo "branch_lc=${branch_lc}" >> "$GITHUB_OUTPUT"
          echo "version=${version}"     >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"             >> "$GITHUB_OUTPUT"
          echo "registry=${registry}"   >> "$GITHUB_OUTPUT"
          echo "Building ${tag}"

      - name: Pull base image
        env:
          REGISTRY: ${{ steps.tags.outputs.registry }}
        run: |
          docker pull ${REGISTRY}:base-web
          docker tag ${REGISTRY}:base-web base-web

      - name: Build docker image
        env:
          TAG: ${{ steps.tags.outputs.tag }}
        run: |
          docker build \
            --force-rm \
            --build-arg APP_GIT_COMMIT=${GITHUB_SHA} \
            --build-arg APP_GIT_BRANCH=${GITHUB_REF_NAME} \
            --build-arg APP_BUILD_TAG=${TAG} \
            --build-arg APP_BUILD_DATE=$(date +%FT%T%z) \
            --tag ${TAG} \
            .

      - name: Test docker image
        env:
          TAG: ${{ steps.tags.outputs.tag }}
        run: |
          docker run \
            --name postgres \
            --detach \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=mtp_api \
            cimg/postgres:16.8
          sleep 10
          docker run \
            --name api \
            -e DJANGO_SETTINGS_MODULE=mtp_api.settings.ci \
            -e DB_PASSWORD=postgres \
            -e DB_USERNAME=postgres \
            -e DB_HOST=postgres \
            --link postgres \
            ${TAG} \
            /bin/bash -c '/app/venv/bin/pip install -r requirements/ci.txt && /app/venv/bin/python manage.py check --verbosity=2 && /app/venv/bin/python manage.py makemigrations --check --verbosity=2 && /app/venv/bin/python manage.py test --verbosity=2'

      - name: Extract test reports
        if: always()
        run: |
          docker cp api:/app/reports /tmp/reports || true
          docker rm api || true
          docker stop postgres || true
          docker rm postgres || true

      - name: Publish test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: /tmp/reports
          if-no-files-found: warn

      - name: Push docker image
        env:
          TAG: ${{ steps.tags.outputs.tag }}
          REGISTRY: ${{ steps.tags.outputs.registry }}
        run: |
          echo "Pushing ${TAG} to ECR"
          docker tag ${TAG} ${REGISTRY}:${TAG}
          docker push ${REGISTRY}:${TAG}
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "Pushing api to ECR (acts as latest)"
            docker tag ${TAG} ${REGISTRY}:api
            docker push ${REGISTRY}:api
          fi

      
      - name: Install kubectl
        if: ${{ github.ref_name == 'main' && vars.GHA_DEPLOY_ENABLED == 'true' }}
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.9

      - name: Deploy to test
        if: ${{ github.ref_name == 'main' && vars.GHA_DEPLOY_ENABLED == 'true' }}
        env:
          TAG: ${{ steps.tags.outputs.tag }}
          VERSION: ${{ steps.tags.outputs.version }}
          REGISTRY: ${{ steps.tags.outputs.registry }}
          K8S_CLUSTER_CERT: ${{ secrets.K8S_CLUSTER_CERT }}
          K8S_CLUSTER_NAME: ${{ secrets.K8S_CLUSTER_NAME }}
          K8S_CLUSTER_SERVER: ${{ secrets.K8S_CLUSTER_SERVER }}
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
        run: |
          echo "Deploying to test"
          echo -n "${K8S_CLUSTER_CERT}" | base64 -d > /tmp/mtp-k8s-ca.crt
          kubectl config set-cluster ${K8S_CLUSTER_NAME} --certificate-authority=/tmp/mtp-k8s-ca.crt --server=${K8S_CLUSTER_SERVER}
          kubectl config set-credentials github-actions --token=${K8S_TOKEN}
          kubectl config set-context ${K8S_CLUSTER_NAME} --cluster=${K8S_CLUSTER_NAME} --user=github-actions --namespace=${K8S_NAMESPACE}
          kubectl config use-context ${K8S_CLUSTER_NAME}
          IMAGE=${REGISTRY}:${TAG}
          kubectl patch configmap app-versions --patch "{\"data\": {\"api\": \"${VERSION}\"}}"
          kubectl patch deployment api --type strategic --patch "{\"metadata\": {\"annotations\": {\"kubernetes.io/change-cause\": \"${VERSION}\"}}, \"spec\": {\"template\": {\"spec\": {\"containers\": [{\"name\": \"app\", \"image\": \"${IMAGE}\"}], \"initContainers\": [{\"name\": \"init\", \"image\": \"${IMAGE}\"},{\"name\": \"copy-static\", \"image\": \"${IMAGE}\"}]}}}}"
